<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Class A office tower">
  <defs>
    <linearGradient id="ofSky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#aed4f2"/><stop offset="1" stop-color="#e8f4fb"/></linearGradient>
    <linearGradient id="ofGlass" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#cfeaff"/><stop offset="0.5" stop-color="#7fb4dd"/><stop offset="1" stop-color="#3f7fb0"/></linearGradient>
    <linearGradient id="ofGlass2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e6f4ff"/><stop offset="1" stop-color="#93c1e2"/></linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#ofSky)"/>
  <rect y="188" width="400" height="32" fill="#8a949c"/>
  <rect y="196" width="400" height="24" fill="#6f7982"/>
  <!-- back building -->
  <rect x="60" y="86" width="90" height="102" fill="#9fb6c6"/>
  <g fill="#c9dced" opacity="0.8"><rect x="70" y="96" width="70" height="8"/><rect x="70" y="112" width="70" height="8"/><rect x="70" y="128" width="70" height="8"/><rect x="70" y="144" width="70" height="8"/><rect x="70" y="160" width="70" height="8"/></g>
  <!-- main tower -->
  <rect x="150" y="30" width="130" height="158" fill="url(#ofGlass)"/>
  <rect x="150" y="30" width="130" height="8" fill="#2f6690"/>
  <g fill="none" stroke="#bfe0f5" stroke-width="1.5" opacity="0.7">
    <line x1="183" y1="34" x2="183" y2="188"/><line x1="216" y1="34" x2="216" y2="188"/><line x1="249" y1="34" x2="249" y2="188"/>
    <line x1="150" y1="58" x2="280" y2="58"/><line x1="150" y1="86" x2="280" y2="86"/><line x1="150" y1="114" x2="280" y2="114"/><line x1="150" y1="142" x2="280" y2="142"/><line x1="150" y1="170" x2="280" y2="170"/>
  </g>
  <!-- side wing -->
  <rect x="280" y="72" width="70" height="116" fill="url(#ofGlass2)"/>
  <g fill="none" stroke="#9dc4e0" stroke-width="1.5" opacity="0.7"><line x1="303" y1="76" x2="303" y2="188"/><line x1="326" y1="76" x2="326" y2="188"/><line x1="280" y1="100" x2="350" y2="100"/><line x1="280" y1="128" x2="350" y2="128"/><line x1="280" y1="156" x2="350" y2="156"/></g>
  <!-- entry canopy -->
  <rect x="192" y="168" width="46" height="20" fill="#1f4a6b"/>
  <rect x="198" y="172" width="34" height="16" fill="#bfe6ff" opacity="0.85"/>
  <g><rect x="30" y="170" width="6" height="18" fill="#6b4a2a"/><circle cx="33" cy="164" r="13" fill="#4f9350"/></g>
</svg>
