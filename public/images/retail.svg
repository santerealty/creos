<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Class A retail center">
  <defs>
    <linearGradient id="rtSky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#cfe9ff"/><stop offset="1" stop-color="#f0f8ff"/></linearGradient>
    <linearGradient id="rtWall" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#efe7da"/><stop offset="1" stop-color="#ddd0bb"/></linearGradient>
    <linearGradient id="rtGlass" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#dff2ff"/><stop offset="1" stop-color="#a5cbe4"/></linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#rtSky)"/>
  <ellipse cx="70" cy="46" rx="26" ry="26" fill="#fff6d6" opacity="0.85"/>
  <!-- parking lot -->
  <rect y="170" width="400" height="50" fill="#8a949c"/>
  <g stroke="#e9edf0" stroke-width="2"><line x1="40" y1="196" x2="40" y2="216"/><line x1="90" y1="196" x2="90" y2="216"/><line x1="140" y1="196" x2="140" y2="216"/><line x1="260" y1="196" x2="260" y2="216"/><line x1="310" y1="196" x2="310" y2="216"/><line x1="360" y1="196" x2="360" y2="216"/></g>
  <!-- storefront strip -->
  <rect x="30" y="96" width="340" height="74" fill="url(#rtWall)"/>
  <rect x="30" y="88" width="340" height="14" fill="#b7452f"/>
  <!-- pylon sign -->
  <rect x="46" y="60" width="8" height="40" fill="#555"/>
  <rect x="34" y="46" width="32" height="20" rx="3" fill="#2f6690"/>
  <!-- storefronts -->
  <g fill="url(#rtGlass)">
    <rect x="42" y="118" width="60" height="48"/><rect x="112" y="118" width="60" height="48"/><rect x="182" y="118" width="60" height="48"/><rect x="252" y="118" width="60" height="48"/><rect x="322" y="118" width="36" height="48"/>
  </g>
  <g fill="#f2c14e"><rect x="42" y="108" width="60" height="8"/><rect x="182" y="108" width="60" height="8"/><rect x="322" y="108" width="36" height="8"/></g>
  <g fill="#5aa9d6"><rect x="112" y="108" width="60" height="8"/><rect x="252" y="108" width="60" height="8"/></g>
  <g fill="none" stroke="#89a7bb" stroke-width="1.5"><line x1="72" y1="118" x2="72" y2="166"/><line x1="142" y1="118" x2="142" y2="166"/><line x1="212" y1="118" x2="212" y2="166"/><line x1="282" y1="118" x2="282" y2="166"/></g>
  <g><rect x="376" y="150" width="6" height="20" fill="#6b4a2a"/><circle cx="379" cy="144" r="13" fill="#4f9350"/></g>
</svg>
